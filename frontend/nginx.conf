# Frontend Nginx: serves the built React bundle and forwards API + Socket
# requests to the backend service. The outer reverse-proxy (nginx/nginx.conf)
# terminates TLS and reaches this container over the private Docker network.

server {
  listen 80;
  server_name _;

  gzip on;
  gzip_types text/plain application/javascript application/json application/xml text/css text/xml image/svg+xml;
  gzip_min_length 512;

  # Long-cache immutable assets
  location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
    root /usr/share/nginx/html;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
}
